<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Runbook Copilot Debug</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #172033;
      }
      main {
        max-width: 1080px;
        margin: 0 auto;
        padding: 28px 20px;
      }
      h1 {
        margin: 0 0 18px;
        font-size: 26px;
      }
      .layout {
        display: grid;
        grid-template-columns: minmax(280px, 420px) 1fr;
        gap: 18px;
      }
      form,
      section {
        background: #fff;
        border: 1px solid #d8dee8;
        border-radius: 8px;
        padding: 16px;
      }
      label {
        display: block;
        margin: 0 0 12px;
        font-size: 13px;
        font-weight: 600;
      }
      input,
      textarea {
        box-sizing: border-box;
        width: 100%;
        margin-top: 6px;
        border: 1px solid #c9d1dd;
        border-radius: 6px;
        padding: 9px 10px;
        font: inherit;
      }
      textarea {
        min-height: 96px;
        resize: vertical;
      }
      button {
        border: 0;
        border-radius: 6px;
        background: #176bce;
        color: #fff;
        padding: 10px 14px;
        font-weight: 700;
        cursor: pointer;
      }
      pre {
        min-height: 420px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        margin: 0;
        font-size: 13px;
      }
      @media (max-width: 820px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Runbook Copilot Debug</h1>
      <div class="layout">
        <form id="form">
          <label>
            告警标题
            <input name="alertTitle" value="checkout-api HTTP 500 错误率升高" required />
          </label>
          <label>
            服务名
            <input name="serviceName" value="checkout-api" required />
          </label>
          <label>
            日志片段
            <textarea name="logSnippet" required>HTTP 500 DB_POOL_EXHAUSTED timeout acquiring connection</textarea>
          </label>
          <label>
            症状描述
            <textarea name="symptomDescription">下单接口大量失败</textarea>
          </label>
          <label>
            <input name="debug" type="checkbox" checked />
            返回 debug 信息
          </label>
          <button type="submit">分析 incident</button>
        </form>
        <section>
          <pre id="result">等待请求...</pre>
        </section>
      </div>
    </main>
    <script>
      const form = document.querySelector("#form");
      const result = document.querySelector("#result");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        result.textContent = "请求中...";
        const data = new FormData(form);
        const payload = {
          alertTitle: data.get("alertTitle"),
          serviceName: data.get("serviceName"),
          logSnippet: data.get("logSnippet"),
          symptomDescription: data.get("symptomDescription") || null,
          debug: data.get("debug") === "on",
        };
        const response = await fetch("/api/incidents/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const body = await response.json();
        result.textContent = JSON.stringify(body, null, 2);
      });
    </script>
  </body>
</html>
